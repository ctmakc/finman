<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#5D5CDE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finman">
  <meta name="description" content="AI-powered personal finance manager — track expenses, budgets, investments">

  <title>Finman — AI Finance Manager</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="app">
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/accounts.js"></script>
  <script src="/js/transactions.js"></script>
  <script src="/js/budgets.js"></script>
  <script src="/js/family.js"></script>
  <script src="/js/recurring.js"></script>
  <script src="/js/currency.js"></script>
  <script src="/js/goals.js"></script>
  <script src="/js/debts.js"></script>
  <script src="/js/split.js"></script>
  <script src="/js/investments.js"></script>
  <script src="/js/analytics.js"></script>
  <script src="/js/subscriptions.js"></script>
  <script src="/js/networth.js"></script>
  <script src="/js/receipts.js"></script>
  <script src="/js/calendar.js"></script>
  <script src="/js/reports.js"></script>
  <script src="/js/forecast.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/bank-api.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/ai-insights.js"></script>
  <script src="/js/ai-chat.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }

    // Install prompt for PWA
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show install button if needed
      const installBtn = document.getElementById('install-btn');
      if (installBtn) installBtn.style.display = 'block';
    });

    function installPWA() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choice) => {
          if (choice.outcome === 'accepted') {
            console.log('App installed');
          }
          deferredPrompt = null;
        });
      }
    }
  </script>
</body>
</html>
